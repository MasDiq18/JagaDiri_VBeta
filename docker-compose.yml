version: '3.9'

services:
  # === Database ===
  postgres:
    image: postgres:16-alpine
    container_name: jagadiri-db
    environment:
      POSTGRES_DB: jagadiri
      POSTGRES_USER: jagadiri_user
      POSTGRES_PASSWORD: jagadiri_secret_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schemas:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jagadiri_user -d jagadiri"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jagadiri-network

  # === Cache & Session ===
  redis:
    image: redis:7-alpine
    container_name: jagadiri-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jagadiri-network

  # === Backend API ===
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: jagadiri-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://jagadiri_user:jagadiri_secret_2024@postgres:5432/jagadiri
      - REDIS_URL=redis://redis:6379/0
      - APP_ENV=development
      - JWT_SECRET_KEY=jagadiri-dev-secret-key-change-in-production-2024
      - JWT_ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=15
      - REFRESH_TOKEN_EXPIRE_DAYS=7
      - CORS_ORIGINS=http://localhost:3000,http://localhost:8000
      - ENCRYPTION_KEY=0123456789abcdef0123456789abcdef
    volumes:
      - ./services/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jagadiri-network

  # === Frontend Web ===
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: jagadiri-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - jagadiri-network

volumes:
  postgres_data:
  redis_data:

networks:
  jagadiri-network:
    driver: bridge
